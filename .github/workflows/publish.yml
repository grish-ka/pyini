name: Publish to PyPI

# This workflow triggers when you publish a new GitHub Release, 
# or you can trigger it manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'  # Matches semantic version tags like v1.2.3
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest
    
    # REQUIRED: These permissions are the magic that makes Trusted Publishing work
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build the binary wheel and source tarball
        run: python -m build

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password/token needed here! The id-token permission handles it.